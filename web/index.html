<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compresor JPEG MozJPEG WASM</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=1" />
  </head>
  <body>
    <h1>Compresor JPEG MozJPEG WASM</h1>
    <p class="subtitle">Compresión en el navegador sin subir imágenes</p>
    <div id="drop-zone">
      <div class="drop-text">Arrastra tu imagen JPEG aquí</div>
      <div class="drop-hint">o haz clic para seleccionar</div>
      <input
        type="file"
        id="file-input"
        accept="image/jpeg"
        style="display: none"
      />
    </div>
    <div class="controls">
      <button id="compress-btn" disabled>Comprimir</button>
      <button id="download-btn" disabled>Descargar</button>
    </div>
    <div id="status">Esperando imagen...</div>
    <div id="stats"></div>
    <img id="preview" alt="Vista previa" />
    <script src="main.js?v=1"></script>
  </body>
</html>
